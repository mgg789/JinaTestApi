services:
  embeddings:
    build: .
    image: jina-embeddings-api
    container_name: jina-embeddings
    ports:
      - "47821:47821"
    volumes:
      - ./models:/app/models
      - ./hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 4G
    environment:
      - PYTHONUNBUFFERED=1
      - API_USER=admin
      - API_PASSWORD=change_me
